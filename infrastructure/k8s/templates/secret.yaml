apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agniveer.fullname" . }}-secrets
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.jwtSecret | quote }}
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.s3AccessKey | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.s3SecretKey | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}
  OPENWEATHERMAP_API_KEY: {{ .Values.secrets.weatherApiKey | quote }}
