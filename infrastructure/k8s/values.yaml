# Kubernetes Helm Chart Values
# Agniveer Sentinel - Enterprise Production

# Global settings
global:
  imageRegistry: ghcr.io
  imagePullSecrets: []
  domain: agniveer.mil.in
  
  # Database
  database:
    host: postgres.primary.svc.cluster.local
    port: 5432
    name: agniveer_db
  
  # Redis
  redis:
    host: redis.master.svc.cluster.local
    port: 6379
  
  # RabbitMQ
  rabbitmq:
    host: rabbitmq.svc.cluster.local
    port: 5672

# Auth Service
authService:
  replicaCount: 2
  image: 
    repository: ghcr.io/agniveer/auth-service
    tag: latest
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Recruitment Service
recruitmentService:
  replicaCount: 2
  image:
    repository: ghcr.io/agniveer/recruitment-service
    tag: latest
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Soldier Service
soldierService:
  replicaCount: 3
  image:
    repository: ghcr.io/agniveer/soldier-service
    tag: latest
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 70

# Training Service
trainingService:
  replicaCount: 2
  image:
    repository: ghcr.io/agniveer/training-service
    tag: latest
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi

# Celery Workers
celeryWorkers:
  main:
    replicaCount: 4
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
  ocr:
    replicaCount: 4
    resources:
      limits:
        cpu: 2000m
        memory: 2Gi
  reports:
    replicaCount: 2
    resources:
      limits:
        cpu: 2000m
        memory: 2Gi

# PostgreSQL
postgresql:
  enabled: true
  replicaCount: 1
  image: postgres:15
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
  persistence:
    size: 100Gi
  backup:
    enabled: true
    schedule: "0 2 * * *"
    retention: 30

# Redis
redis:
  enabled: true
  cluster:
    enabled: true
    nodes: 3
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi

# RabbitMQ
rabbitmq:
  enabled: true
  replicaCount: 3
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
  persistence:
    size: 20Gi

# Monitoring
monitoring:
  prometheus:
    enabled: true
    retention: 30d
  grafana:
    enabled: true
  alertmanager:
    enabled: true
  elasticsearch:
    enabled: true

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "60"
  hosts:
    - host: api.agniveer.mil.in
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: agniveer-tls
      hosts:
        - api.agniveer.mil.in

# Security
security:
  podSecurityPolicy:
    enabled: true
  networkPolicy:
    enabled: true
