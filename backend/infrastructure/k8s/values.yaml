# Kubernetes Helm Chart Values
# Agniveer Sentinel - Enterprise Production

# Global settings
global:
  imageRegistry: ghcr.io
  imagePullSecrets: []
  domain: agniveer.mil.in
  
  # Database
  database:
    host: postgres.primary.svc.cluster.local
    port: 5432
    name: agniveer_db
  
  # Redis
  redis:
    host: redis.master.svc.cluster.local
    port: 6379
  
  # RabbitMQ
  rabbitmq:
    host: rabbitmq.svc.cluster.local
    port: 5672

# Auth Service
authService:
  replicaCount: 2
  image: 
    repository: ghcr.io/agniveer/auth-service
    tag: latest
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Recruitment Service
recruitmentService:
  replicaCount: 2
  image:
    repository: ghcr.io/agniveer/recruitment-service
    tag: latest
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Soldier Service
soldierService:
  replicaCount: 3
  image:
    repository: ghcr.io/agniveer/soldier-service
    tag: latest
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 70

# Training Service
trainingService:
  replicaCount: 2
  image:
    repository: ghcr.io/agniveer/training-service
    tag: latest
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi

# Celery Workers
celeryWorkers:
  main:
    replicaCount: 4
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
  ocr:
    replicaCount: 4
    resources:
      limits:
        cpu: 2000m
        memory: 2Gi
  reports:
    replicaCount: 2
    resources:
      limits:
        cpu: 2000m
        memory: 2Gi

# PostgreSQL
postgresql:
  enabled: true
  replicaCount: 1
  image: postgres:15
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
  persistence:
    size: 100Gi
  backup:
    enabled: true
    schedule: "0 2 * * *"
    retention: 30

# Redis
redis:
  enabled: true
  cluster:
    enabled: true
    nodes: 3
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi

# RabbitMQ
rabbitmq:
  enabled: true
  replicaCount: 3
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
  persistence:
    size: 20Gi

# Monitoring
monitoring:
  prometheus:
    enabled: true
    retention: 30d
  grafana:
    enabled: true
  alertmanager:
    enabled: true
  elasticsearch:
    enabled: true

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "60"
  hosts:
    - host: api.agniveer.mil.in
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: agniveer-tls
      hosts:
        - api.agniveer.mil.in

# Security
security:
  podSecurityPolicy:
    enabled: true
  networkPolicy:
    enabled: true

secrets:
  jwtSecret: "change-me"
  postgresUser: "postgres"
  postgresPassword: "postgres"
  s3AccessKey: "minioadmin"
  s3SecretKey: "minioadmin"
  smtpUser: "noreply@example.com"
  smtpPassword: "change-me"
  weatherApiKey: "change-me"

services:
  auth-service:
    path: /api/v1/auth
    port: 8001
    replicaCount: 2
    image:
      repository: ghcr.io/agniveer/auth-service
      tag: latest
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
  recruitment-service:
    path: /api/v1/recruitment
    port: 8002
    replicaCount: 2
    image:
      repository: ghcr.io/agniveer/recruitment-service
      tag: latest
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
  document-service:
    path: /api/v1/documents
    port: 8003
    replicaCount: 1
    image:
      repository: ghcr.io/agniveer/document-service
      tag: latest
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 70
  soldier-service:
    path: /api/v1/soldiers
    port: 8004
    replicaCount: 2
    image:
      repository: ghcr.io/agniveer/soldier-service
      tag: latest
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 12
      targetCPUUtilizationPercentage: 70
  training-service:
    path: /api/v1/training
    port: 8006
    replicaCount: 2
    image:
      repository: ghcr.io/agniveer/training-service
      tag: latest
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 2Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
  report-service:
    path: /api/v1/reports
    port: 8008
    replicaCount: 1
    image:
      repository: ghcr.io/agniveer/report-service
      tag: latest
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 70
  notification-service:
    path: /api/v1/notifications
    port: 8009
    replicaCount: 2
    image:
      repository: ghcr.io/agniveer/notification-service
      tag: latest
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
  ml-service:
    path: /api/v1/ml
    port: 8010
    replicaCount: 1
    image:
      repository: ghcr.io/agniveer/ml-service
      tag: latest
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 2Gi
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 70
  weather-service:
    path: /api/v1/weather
    port: 8011
    replicaCount: 1
    image:
      repository: ghcr.io/agniveer/weather-service
      tag: latest
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 70
