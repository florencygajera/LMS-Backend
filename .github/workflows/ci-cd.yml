# CI/CD Pipeline
# Agniveer Sentinel - Enterprise Production

name: CI/CD Pipeline

on:
  workflow_dispatch: {}
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Run tests
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install flake8
          python -m pip check
      
      - name: Compile all python files
        run: |
          cd backend && python -m compileall -q api core models schemas services tests agniassist

      - name: Run linter
        run: |
          cd backend && python -m flake8 api core models schemas services tests agniassist --jobs 1 --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Run tests
        env:
          DEBUG: "false"
          PYTHONPATH: "."
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          cd backend && python -m pytest tests/ --ignore=../tests -v --cov=services --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # Build Docker images
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose configuration
        run: docker compose -f docker-compose.yml config -q

      - name: Build service images
        run: |
          docker compose build auth-service recruitment-service soldier-service document-service training-service report-service notification-service ml-service weather-service

      - name: Ensure required deployment files exist
        run: |
          test -f docker-compose.yml
          test -f nginx.conf
          test -f infrastructure/k8s/Chart.yaml

  # Deploy to staging
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: development
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          # Would use kubectl or docker-compose to deploy
          # Example: kubectl apply -f k8s/staging/

  # Deploy to production
  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Production
        run: |
          echo "Deploying to production environment..."
          # Would use kubectl or docker-compose to deploy
          # Would require approval for production deployments
